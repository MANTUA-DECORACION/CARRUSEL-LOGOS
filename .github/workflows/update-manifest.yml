name: Actualizar manifest de logos

on:
  push:
    paths:
      - 'logos/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Generar manifest.json
        run: |
          python <<'PY'
          import os
          import json

          base = "logos"
          extensiones = (".png", ".jpg", ".jpeg", ".webp", ".svg")
          manifest = {}

          if os.path.isdir(base):
              for carpeta in sorted(os.listdir(base)):
                  ruta_carpeta = os.path.join(base, carpeta)

                  if os.path.isdir(ruta_carpeta):
                      archivos = []
                      for nombre in sorted(os.listdir(ruta_carpeta)):
                          ruta_archivo = os.path.join(ruta_carpeta, nombre)
                          if os.path.isfile(ruta_archivo) and nombre.lower().endswith(extensiones):
                              archivos.append(f"logos/{carpeta}/{nombre}")

                      if archivos:
                          manifest[carpeta] = archivos

          with open("manifest.json", "w", encoding="utf-8") as f:
              json.dump(manifest, f, ensure_ascii=False, indent=2)
          PY

      - name: Subir cambios si hubo actualización
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git diff --cached --quiet || git commit -m "Actualizar manifest.json automáticamente"
          git push
